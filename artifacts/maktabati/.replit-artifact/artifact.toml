kind = "web"
previewPath = "/"
title = "مكتبتي"
version = "1.0.0"
id = "artifacts/maktabati"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19853

[services.development]
run = "pnpm --filter @workspace/maktabati run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/maktabati", "run", "build" ]
publicDir = "artifacts/maktabati/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19853"
BASE_PATH = "/"
